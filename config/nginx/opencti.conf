# Rate limiting zones
limit_req_zone $binary_remote_addr zone=opencti_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=opencti_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=opencti_general:10m rate=50r/s;

server {
    listen 8443 ssl;
    server_name localhost;
    server_tokens off;

    ssl_certificate     /etc/nginx/ssl/opencti.crt;
    ssl_certificate_key /etc/nginx/ssl/opencti.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Login endpoint - strict rate limit (brute-force protection)
    location /graphql {
        limit_req zone=opencti_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://opencti:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        limit_req zone=opencti_general burst=30 nodelay;
        limit_req_status 429;

        proxy_pass         http://opencti:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # WebSocket support (required by OpenCTI)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_cache        off;
        proxy_buffering    off;
        chunked_transfer_encoding off;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
