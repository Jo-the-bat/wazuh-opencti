name: Lint and Validate

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Lint shell scripts
        run: |
          # SC2034: unused loop var (for i in seq), SC2164: cd without || exit (set -e handles it)
          shellcheck -S warning -e SC2034,SC2164 \
            setup.sh backup.sh restore.sh upgrade.sh \
            scripts/healthcheck-monitor.sh \
            scripts/test-deployment.sh \
            scripts/ctem-report.sh \
            scripts/configure-shuffle.sh
          # Upstream wrapper script — exclude word splitting (SC2046) and cd (SC2164)
          shellcheck -S warning -s sh -e SC2046,SC2164 config/wazuh_integrations/custom-opencti
      - name: ShellCheck (SARIF)
        if: always()
        run: |
          shellcheck -S warning -e SC2034,SC2164 \
            -f json \
            setup.sh scripts/*.sh 2>/dev/null | python3 -c "
          import sys, json
          checks = json.load(sys.stdin)
          sarif = {
            '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json',
            'version': '2.1.0',
            'runs': [{
              'tool': {'driver': {'name': 'ShellCheck', 'rules': []}},
              'results': []
            }]
          }
          rules_seen = set()
          for c in checks:
            rule_id = 'SC%d' % c['code']
            if rule_id not in rules_seen:
              rules_seen.add(rule_id)
              sarif['runs'][0]['tool']['driver']['rules'].append({
                'id': rule_id,
                'shortDescription': {'text': c.get('message', rule_id)}
              })
            sarif['runs'][0]['results'].append({
              'ruleId': rule_id,
              'level': {'error': 'error', 'warning': 'warning', 'info': 'note', 'style': 'note'}.get(c.get('level','warning'), 'warning'),
              'message': {'text': c.get('message', '')},
              'locations': [{
                'physicalLocation': {
                  'artifactLocation': {'uri': c.get('file','')},
                  'region': {'startLine': c.get('line',1), 'startColumn': c.get('column',1)}
                }
              }]
            })
          json.dump(sarif, open('shellcheck.sarif','w'), indent=2)
          print('Generated shellcheck.sarif with %d findings' % len(checks))
          " || true
      - name: Upload ShellCheck results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: shellcheck.sarif
          category: shellcheck

  python-check:
    name: Python syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check syntax and lint
        run: |
          python -m py_compile config/wazuh_integrations/custom-opencti.py
          pip install flake8 -q
          # Upstream code style — only check for real errors (F-codes), not style
          flake8 config/wazuh_integrations/custom-opencti.py \
            --max-line-length=250 \
            --select=E9,F63,F7,F82

  yaml-lint:
    name: YAML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install yamllint
        run: pip install yamllint -q
      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml \
            docker-compose.yml \
            generate-indexer-certs.yml \
            config/certs.yml \
            config/wazuh_indexer/wazuh.indexer.yml \
            config/wazuh_dashboard/opensearch_dashboards.yml

  xml-validate:
    name: XML files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate XML
        run: |
          sudo apt-get install -yqq libxml2-utils > /dev/null
          xmllint --noout config/wazuh_rules/opencti_rules.xml
          xmllint --noout config/wazuh_rules/stormshield_rules.xml
          # Wazuh decoders use multiple root <decoder> elements (no single root).
          # Wrap in temporary <root> for xmllint validation.
          echo "<root>$(cat config/wazuh_decoders/stormshield_decoders.xml)</root>" | xmllint --noout -

  nginx-validate:
    name: Nginx config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate dummy TLS certs
        run: |
          mkdir -p config/nginx/ssl
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout config/nginx/ssl/opencti.key \
            -out config/nginx/ssl/opencti.crt \
            -subj "/CN=test" 2>/dev/null
      - name: Validate nginx configs
        run: |
          # nginx -t resolves upstreams at parse time, so we add stub resolver entries
          docker run --rm \
            -v ${{ github.workspace }}/config/nginx/opencti.conf:/etc/nginx/conf.d/default.conf:ro \
            -v ${{ github.workspace }}/config/nginx/shuffle.conf:/etc/nginx/conf.d/shuffle.conf:ro \
            -v ${{ github.workspace }}/config/nginx/grafana.conf:/etc/nginx/conf.d/grafana.conf:ro \
            -v ${{ github.workspace }}/config/nginx/ssl:/etc/nginx/ssl:ro \
            --add-host opencti:127.0.0.1 \
            --add-host shuffle-frontend:127.0.0.1 \
            --add-host shuffle-backend:127.0.0.1 \
            --add-host grafana:127.0.0.1 \
            nginx:1.28-alpine nginx -t

  compose-validate:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Generate CI .env
        run: |
          cat > .env << 'EOF'
          WAZUH_VERSION=4.14.4
          WAZUH_INDEXER_PASSWORD=CiTestPassword1!
          WAZUH_API_PASSWORD=CiTestPassword1!
          WAZUH_DASHBOARD_PASSWORD=CiTestPassword1!
          OPENCTI_VERSION=6.9.28
          OPENCTI_BASE_URL=https://localhost:8443
          OPENCTI_ADMIN_EMAIL=test@test.io
          OPENCTI_ADMIN_PASSWORD=CiTestPassword1
          OPENCTI_ADMIN_TOKEN=00000000-0000-0000-0000-000000000001
          OPENCTI_PORT=8443
          OPENCTI_HEALTH_KEY=CiTestHealthKey
          ELASTICSEARCH_VERSION=8.19.13
          ELASTIC_MEMORY_SIZE=3G
          ELASTIC_PASSWORD=CiTestPassword1
          REDIS_VERSION=7.4
          REDIS_PASSWORD=CiTestPassword1
          RABBITMQ_VERSION=4.2.5-management
          RABBITMQ_DEFAULT_USER=opencti
          RABBITMQ_DEFAULT_PASS=CiTestPassword1
          MINIO_VERSION=RELEASE.2025-09-07T16-13-09Z
          MINIO_ROOT_USER=opencti
          MINIO_ROOT_PASSWORD=CiTestPassword1
          CONNECTOR_EXPORT_FILE_STIX_ID=00000000-0000-0000-0000-000000000002
          CONNECTOR_EXPORT_FILE_CSV_ID=00000000-0000-0000-0000-000000000003
          CONNECTOR_IMPORT_FILE_STIX_ID=00000000-0000-0000-0000-000000000004
          CONNECTOR_IMPORT_DOCUMENT_ID=00000000-0000-0000-0000-000000000005
          CONNECTOR_MITRE_ID=00000000-0000-0000-0000-000000000006
          CONNECTOR_OPENCTI_DATASETS_ID=00000000-0000-0000-0000-000000000007
          CONNECTOR_URLHAUS_ID=00000000-0000-0000-0000-000000000008
          CONNECTOR_CISA_KEV_ID=00000000-0000-0000-0000-000000000009
          CONNECTOR_THREATFOX_ID=00000000-0000-0000-0000-000000000010
          CONNECTOR_VXVAULT_ID=00000000-0000-0000-0000-000000000013
          CONNECTOR_DISARM_ID=00000000-0000-0000-0000-000000000014
          WAZUH_CONNECTOR_VERSION=0.3.0
          CONNECTOR_WAZUH_ID=00000000-0000-0000-0000-000000000011
          SHUFFLE_VERSION=v2.2.0
          SHUFFLE_OPENSEARCH_VERSION=2.19.2
          SHUFFLE_DEFAULT_USERNAME=admin
          SHUFFLE_DEFAULT_PASSWORD=CiTestPassword1
          SHUFFLE_DEFAULT_APIKEY=00000000-0000-0000-0000-000000000012
          SHUFFLE_ENCRYPTION_MODIFIER=CiTestEncryptionModifier12345678
          SHUFFLE_PORT=3443
          PROMETHEUS_VERSION=v3.11.0
          CADVISOR_VERSION=v0.56.2
          GRAFANA_VERSION=12.4.2
          GRAFANA_ADMIN_PASSWORD=CiTestPassword1
          GRAFANA_PORT=4443
          SMTP_HOSTNAME=localhost
          ALERT_EMAIL_FROM=wazuh@localhost
          ALERT_EMAIL_TO=soc@localhost
          OPENCTI_HOSTNAME=localhost
          EOF

      - name: Validate compose config
        run: |
          docker compose config --quiet
          echo "Base config: OK"

      - name: Validate with all profiles
        run: |
          docker compose --profile alienvault --profile abuseipdb --profile cve --profile monitoring --profile suricata config --quiet
          echo "All profiles: OK"

      - name: Verify service count
        run: |
          BASE=$(docker compose config --services | wc -l)
          ALL=$(docker compose --profile alienvault --profile abuseipdb --profile cve --profile monitoring --profile suricata config --services | wc -l)
          echo "Base services: ${BASE} (expected 26)"
          echo "All services:  ${ALL} (expected 34)"
          [ "$BASE" -eq 26 ] || { echo "FAIL: expected 26 base services, got ${BASE}"; exit 1; }
          [ "$ALL" -eq 34 ] || { echo "FAIL: expected 34 total services, got ${ALL}"; exit 1; }

      - name: Check all env vars are covered
        run: |
          # Extract all ${VAR} and ${VAR:-default} references from compose file
          COMPOSE_VARS=$(grep -oP '\$\{([A-Z_]+)' docker-compose.yml | sed 's/\${//' | sort -u)
          MISSING=0
          for var in $COMPOSE_VARS; do
            if ! grep -q "^${var}=" .env && ! grep -q "^#.*${var}=" .env; then
              echo "WARNING: ${var} referenced in docker-compose.yml but not in .env"
              MISSING=$((MISSING + 1))
            fi
          done
          # Allow optional vars (API keys, vars with defaults, profile-only services) to be missing
          [ "$MISSING" -le 8 ] || { echo "FAIL: too many missing env vars (${MISSING})"; exit 1; }

  env-generation:
    name: .env generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Test .env generation logic
        run: |
          # Extract and run the helper functions and .env generation from setup.sh
          generate_uuid() {
            python3 -c "import uuid; print(uuid.uuid4())" 2>/dev/null \
              || cat /proc/sys/kernel/random/uuid 2>/dev/null \
              || uuidgen
          }
          generate_password() {
            head -c 48 /dev/urandom | base64 | tr -d '/+=' | head -c "${1:-24}"
          }
          generate_wazuh_password() {
            echo "$(generate_password 14)@Wz1!"
          }

          # Generate all passwords
          WAZUH_INDEXER_PASSWORD=$(generate_wazuh_password)
          WAZUH_API_PASSWORD=$(generate_wazuh_password)
          WAZUH_DASHBOARD_PASSWORD=$(generate_wazuh_password)
          OPENCTI_ADMIN_PASSWORD=$(generate_password 20)
          OPENCTI_ADMIN_TOKEN=$(generate_uuid)
          MINIO_ROOT_PASSWORD=$(generate_password 20)
          RABBITMQ_DEFAULT_PASS=$(generate_password 20)
          ELASTIC_PASSWORD=$(generate_password 20)
          REDIS_PASSWORD=$(generate_password 20)
          OPENCTI_HEALTH_KEY=$(generate_password 16)
          SHUFFLE_DEFAULT_PASSWORD=$(generate_password 20)
          SHUFFLE_DEFAULT_APIKEY=$(generate_uuid)
          SHUFFLE_ENCRYPTION_MODIFIER=$(generate_password 32)

          # Verify all passwords are non-empty and meet minimum length
          for var in WAZUH_INDEXER_PASSWORD WAZUH_API_PASSWORD WAZUH_DASHBOARD_PASSWORD \
                     OPENCTI_ADMIN_PASSWORD OPENCTI_ADMIN_TOKEN MINIO_ROOT_PASSWORD \
                     RABBITMQ_DEFAULT_PASS ELASTIC_PASSWORD REDIS_PASSWORD \
                     OPENCTI_HEALTH_KEY SHUFFLE_DEFAULT_PASSWORD SHUFFLE_DEFAULT_APIKEY \
                     SHUFFLE_ENCRYPTION_MODIFIER; do
            val="${!var}"
            if [ -z "$val" ]; then
              echo "FAIL: ${var} is empty"
              exit 1
            fi
            echo "OK: ${var} = ${val:0:4}... (${#val} chars)"
          done

          # Verify UUID format
          if ! echo "$OPENCTI_ADMIN_TOKEN" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "FAIL: OPENCTI_ADMIN_TOKEN is not a valid UUID: ${OPENCTI_ADMIN_TOKEN}"
            exit 1
          fi

          echo "All credentials generated successfully."
