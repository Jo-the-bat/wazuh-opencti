x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

x-proxy-env: &proxy-env
  - path: proxy.env
    required: false

x-connector-healthcheck: &connector-healthcheck
  test: ["CMD-SHELL", "pgrep -f 'main.py' || exit 1"]
  interval: 60s
  timeout: 5s
  retries: 5
  start_period: 120s

# ANSSI R8-: drop all capabilities, add back only what's needed
# ANSSI R12: read-only root filesystem with tmpfs for writable paths
# CIS 5.25: no-new-privileges prevents privilege escalation inside containers
x-connector-security: &connector-security
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]

services:

  # ==========================================
  # WAZUH STACK
  # ==========================================

  wazuh.manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION}
    hostname: wazuh.manager
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    env_file: *proxy-env
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.00"
    healthcheck:
      test: ["CMD-SHELL", "curl -sku wazuh-wui:${WAZUH_API_PASSWORD} https://localhost:55000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 655360, hard: 655360 }
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      INDEXER_URL: https://wazuh.indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      FILEBEAT_SSL_VERIFICATION_MODE: full
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat.key
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/filebeat/2-custom-filebeat:/etc/cont-init.d/2-custom-filebeat:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:ro
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./config/wazuh_integrations/custom-opencti:/var/ossec/integrations/custom-opencti:ro
      - ./config/wazuh_integrations/custom-opencti.py:/var/ossec/integrations/custom-opencti.py:ro
      - ./config/wazuh_integrations/custom-shuffle:/var/ossec/integrations/custom-shuffle:ro
      - ./config/wazuh_integrations/custom-shuffle.py:/var/ossec/integrations/custom-shuffle.py:ro
      - ./config/wazuh_rules/opencti_rules.xml:/var/ossec/etc/rules/opencti_rules.xml:ro
      - ./config/wazuh_rules/stormshield_rules.xml:/var/ossec/etc/rules/stormshield_rules.xml:ro
      - ./config/wazuh_rules/correlation_rules.xml:/var/ossec/etc/rules/correlation_rules.xml:ro
      - ./config/wazuh_decoders/stormshield_decoders.xml:/var/ossec/etc/decoders/stormshield_decoders.xml:ro
    networks:
      - wazuh-opencti
    depends_on:
      wazuh.indexer:
        condition: service_healthy

  wazuh.indexer:
    image: wazuh/wazuh-indexer:${WAZUH_VERSION}
    hostname: wazuh.indexer
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [IPC_LOCK, SETUID, SETGID, DAC_OVERRIDE]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.00"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
      bootstrap.memory_lock: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sku admin:${WAZUH_INDEXER_PASSWORD} https://localhost:9200/_cluster/health || curl -sku admin:admin https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml:ro
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/indexer-key.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/indexer.pem:ro
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem:ro
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem:ro
    networks:
      - wazuh-opencti

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION}
    hostname: wazuh.dashboard
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"
    ports:
      - "9443:5601"
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD}
      WAZUH_API_URL: https://wazuh.manager
      DASHBOARD_USERNAME: kibanaserver
      DASHBOARD_PASSWORD: ${WAZUH_DASHBOARD_PASSWORD}
      API_USERNAME: wazuh-wui
      API_PASSWORD: ${WAZUH_API_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:5601/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
    networks:
      - wazuh-opencti
    depends_on:
      wazuh.manager:
        condition: service_healthy
      wazuh.indexer:
        condition: service_healthy

  # ==========================================
  # OPENCTI INFRASTRUCTURE
  # ==========================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTICSEARCH_VERSION}
    hostname: elasticsearch
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2.00"
    environment:
      discovery.type: single-node
      xpack.ml.enabled: "false"
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: "-Xms${ELASTIC_MEMORY_SIZE} -Xmx${ELASTIC_MEMORY_SIZE}"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    networks:
      - wazuh-opencti

  redis:
    image: redis:${REDIS_VERSION}
    hostname: redis
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 768mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redisdata:/data
    networks:
      - wazuh-opencti

  rabbitmq:
    image: rabbitmq:${RABBITMQ_VERSION}
    hostname: rabbitmq
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_NODENAME: rabbit01@localhost
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - amqpdata:/var/lib/rabbitmq
    networks:
      - wazuh-opencti

  minio:
    image: minio/minio:${MINIO_VERSION}
    hostname: minio
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    volumes:
      - s3data:/data
    networks:
      - wazuh-opencti

  # ==========================================
  # OPENCTI APPLICATION
  # ==========================================

  opencti:
    image: opencti/platform:${OPENCTI_VERSION}
    hostname: opencti
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.00"
    environment:
      - NODE_OPTIONS=--max-old-space-size=3072
      - APP__PORT=8080
      - APP__BASE_URL=${OPENCTI_BASE_URL}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__APP_LOGS__LOGS_LEVEL=error
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      - REDIS__PASSWORD=${REDIS_PASSWORD}
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - ELASTICSEARCH__USERNAME=elastic
      - ELASTICSEARCH__PASSWORD=${ELASTIC_PASSWORD}
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__PORT_MANAGEMENT=15672
      - RABBITMQ__MANAGEMENT_SSL=false
      - RABBITMQ__USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - SMTP__HOSTNAME=${SMTP_HOSTNAME}
      - SMTP__PORT=25
      - PROVIDERS__LOCAL__STRATEGY=LocalStrategy
      - APP__SESSION__IDLE_TIMEOUT=30m
      - APP__HEALTH_ACCESS_KEY=${OPENCTI_HEALTH_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:8080/health?health_access_key=${OPENCTI_HEALTH_KEY}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 300s
    networks:
      - wazuh-opencti
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  opencti-worker:
    image: opencti/worker:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=info
    healthcheck: *connector-healthcheck
    networks:
      - wazuh-opencti
    depends_on:
      opencti:
        condition: service_healthy

  # ==========================================
  # OPENCTI INTERNAL CONNECTORS
  # ==========================================

  connector-export-file-stix:
    image: opencti/connector-export-file-stix:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_STIX_ID}
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileStix2
      - CONNECTOR_SCOPE=application/json
      - CONNECTOR_LOG_LEVEL=info
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-export-file-csv:
    image: opencti/connector-export-file-csv:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_CSV_ID}
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileCsv
      - CONNECTOR_SCOPE=text/csv
      - CONNECTOR_LOG_LEVEL=info
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-import-file-stix:
    image: opencti/connector-import-file-stix:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_FILE_STIX_ID}
      - CONNECTOR_TYPE=INTERNAL_IMPORT_FILE
      - CONNECTOR_NAME=ImportFileStix2
      - CONNECTOR_SCOPE=application/json,text/xml
      - CONNECTOR_AUTO=true
      - CONNECTOR_LOG_LEVEL=info
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-import-document:
    image: opencti/connector-import-document:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_DOCUMENT_ID}
      - CONNECTOR_TYPE=INTERNAL_IMPORT_FILE
      - CONNECTOR_NAME=ImportDocument
      - CONNECTOR_SCOPE=application/pdf,text/plain,text/csv,text/html
      - CONNECTOR_AUTO=true
      - CONNECTOR_LOG_LEVEL=info
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  # ==========================================
  # THREAT INTEL CONNECTORS (free, no API key)
  # ==========================================

  connector-mitre:
    image: opencti/connector-mitre:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_MITRE_ID}
      - CONNECTOR_NAME=MITRE ATT&CK
      - CONNECTOR_SCOPE=mitre
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - MITRE_INTERVAL=7
      - MITRE_REMOVE_STATEMENT_MARKING=true
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-opencti-datasets:
    image: opencti/connector-opencti:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_OPENCTI_DATASETS_ID}
      - CONNECTOR_NAME=OpenCTI Datasets
      - CONNECTOR_SCOPE=marking-definition,identity,location
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CONFIG_INTERVAL=7
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-urlhaus:
    image: opencti/connector-urlhaus:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_URLHAUS_ID}
      - CONNECTOR_NAME=URLhaus
      - CONNECTOR_SCOPE=urlhaus
      - CONNECTOR_LOG_LEVEL=info
      - URLHAUS_CSV_URL=https://urlhaus.abuse.ch/downloads/csv_recent/
      - URLHAUS_IMPORT_OFFLINE=true
      - URLHAUS_THREATS_FROM_LABELS=true
      - URLHAUS_INTERVAL=3
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-cisa-kev:
    image: opencti/connector-cisa-known-exploited-vulnerabilities:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_CISA_KEV_ID}
      - CONNECTOR_NAME=CISA KEV
      - CONNECTOR_SCOPE=cisa
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CISA_CATALOG_URL=https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
      - CISA_CREATE_INFRASTRUCTURES=false
      - CISA_TLP=TLP:CLEAR
      - CISA_INTERVAL=7
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-threatfox:
    image: opencti/connector-threatfox:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_THREATFOX_ID}
      - CONNECTOR_NAME=ThreatFox
      - CONNECTOR_SCOPE=threatfox
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - THREATFOX_CSV_URL=https://threatfox.abuse.ch/export/json/recent/
      - THREATFOX_IMPORT_OFFLINE=true
      - THREATFOX_INTERVAL=3
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-vxvault:
    image: opencti/connector-vxvault:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_VXVAULT_ID}
      - CONNECTOR_NAME=VX Vault
      - CONNECTOR_SCOPE=vxvault
      - CONNECTOR_LOG_LEVEL=info
      - VXVAULT_URL=https://vxvault.net/URL_List.php
      - VXVAULT_CREATE_INDICATORS=true
      - VXVAULT_INTERVAL=3
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-disarm:
    image: opencti/connector-disarm-framework:${OPENCTI_VERSION}
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_DISARM_ID}
      - CONNECTOR_NAME=DISARM Framework
      - CONNECTOR_SCOPE=marking-definition,identity,attack-pattern,course-of-action
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_RUN_AND_TERMINATE=false
      - DISARM_FRAMEWORK_URL=https://raw.githubusercontent.com/DISARMFoundation/DISARMframeworks/main/generated_files/DISARM_STIX/DISARM.json
      - DISARM_FRAMEWORK_INTERVAL=7
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  # ==========================================
  # OPTIONAL CONNECTORS (require API keys)
  # Activate with: docker compose --profile <name> up -d
  # ==========================================

  connector-alienvault:
    image: opencti/connector-alienvault:${OPENCTI_VERSION}
    restart: always
    profiles: ["alienvault"]
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ALIENVAULT_ID:-00000000-0000-0000-0000-000000000000}
      - CONNECTOR_NAME=AlienVault OTX
      - CONNECTOR_SCOPE=alienvault
      - CONNECTOR_LOG_LEVEL=info
      - ALIENVAULT_BASE_URL=https://otx.alienvault.com
      - ALIENVAULT_API_KEY=${ALIENVAULT_API_KEY}
      - ALIENVAULT_TLP=White
      - ALIENVAULT_CREATE_OBSERVABLES=true
      - ALIENVAULT_CREATE_INDICATORS=true
      - ALIENVAULT_PULSE_START_TIMESTAMP=2024-01-01T00:00:00
      - ALIENVAULT_REPORT_TYPE=threat-report
      - ALIENVAULT_GUESS_MALWARE=false
      - ALIENVAULT_GUESS_CVE=false
      - ALIENVAULT_EXCLUDED_PULSE_INDICATOR_TYPES=FileHash-MD5,FileHash-SHA1
      - ALIENVAULT_ENABLE_RELATIONSHIPS=true
      - CONNECTOR_DURATION_PERIOD=PT6H
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-abuseipdb:
    image: opencti/connector-abuseipdb-ipblacklist:${OPENCTI_VERSION}
    restart: always
    profiles: ["abuseipdb"]
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ABUSEIPDB_ID:-00000000-0000-0000-0000-000000000000}
      - CONNECTOR_NAME=AbuseIPDB
      - CONNECTOR_SCOPE=abuseipdb
      - CONNECTOR_LOG_LEVEL=info
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - ABUSEIPDB_SCORE=80
      - ABUSEIPDB_LIMIT=500000
      - CONNECTOR_DURATION_PERIOD=PT12H
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  connector-cve:
    image: opencti/connector-cve:${OPENCTI_VERSION}
    restart: always
    profiles: ["cve"]
    logging: *default-logging
    env_file: *proxy-env
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_CVE_ID:-00000000-0000-0000-0000-000000000000}
      - CONNECTOR_NAME=CVE
      - CONNECTOR_SCOPE=cve
      - CONNECTOR_LOG_LEVEL=info
      - CVE_BASE_URL=https://services.nvd.nist.gov/rest/json/cves
      - CVE_API_KEY=${CVE_API_KEY}
      - CVE_INTERVAL=6
      - CVE_MAX_DATE_RANGE=120
      - CVE_MAINTAIN_DATA=true
      - CVE_PULL_HISTORY=false
    healthcheck: *connector-healthcheck
    networks: [wazuh-opencti]
    depends_on:
      opencti: { condition: service_healthy }

  # ==========================================
  # WAZUH <-> OPENCTI INTEGRATION
  # ==========================================

  wazuh-connector:
    image: ghcr.io/misje/opencti-wazuh-connector:${WAZUH_CONNECTOR_VERSION}
    restart: always
    logging: *default-logging
    <<: *connector-security
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_WAZUH_ID}
      - CONNECTOR_TYPE=INTERNAL_ENRICHMENT
      - CONNECTOR_NAME=Wazuh
      - CONNECTOR_SCOPE=StixFile,Artifact,IPv4-Addr,IPv6-Addr,Domain-Name,Hostname,Url,Vulnerability
      - CONNECTOR_AUTO=true
      - CONNECTOR_CONFIDENCE_LEVEL=80
      - CONNECTOR_LOG_LEVEL=info
      - WAZUH_MAX_TLP=TLP:AMBER+STRICT
      - WAZUH_APP_URL=https://wazuh.dashboard:5601
      - WAZUH_OPENSEARCH_URL=https://wazuh.indexer:9200
      - WAZUH_OPENSEARCH_USERNAME=admin
      - WAZUH_OPENSEARCH_PASSWORD=${WAZUH_INDEXER_PASSWORD}
      - WAZUH_OPENSEARCH_VERIFY_TLS=true
      - REQUESTS_CA_BUNDLE=/etc/ssl/root-ca.pem
    healthcheck: *connector-healthcheck
    volumes:
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/etc/ssl/root-ca.pem:ro
    networks:
      - wazuh-opencti
    depends_on:
      opencti:
        condition: service_healthy
      wazuh.indexer:
        condition: service_healthy

  # ==========================================
  # SHUFFLE SOAR
  # ==========================================

  shuffle-opensearch:
    image: opensearchproject/opensearch:${SHUFFLE_OPENSEARCH_VERSION}
    hostname: shuffle-opensearch
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"
    environment:
      - cluster.name=shuffle-cluster
      - node.name=shuffle-opensearch
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - shuffle-opensearch-data:/usr/share/opensearch/data
    networks:
      - wazuh-opencti

  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:${SHUFFLE_VERSION}
    hostname: shuffle-backend
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    # No cap_drop/no-new-privileges: Shuffle needs Docker socket to manage workflow containers
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.00"
    environment:
      - SHUFFLE_APP_SDK_VERSION=${SHUFFLE_VERSION}
      - SHUFFLE_WORKER_VERSION=${SHUFFLE_VERSION}
      - SHUFFLE_OPENSEARCH_URL=http://shuffle-opensearch:9200
      - SHUFFLE_DEFAULT_USERNAME=${SHUFFLE_DEFAULT_USERNAME}
      - SHUFFLE_DEFAULT_PASSWORD=${SHUFFLE_DEFAULT_PASSWORD}
      - SHUFFLE_DEFAULT_APIKEY=${SHUFFLE_DEFAULT_APIKEY}
      - SHUFFLE_ENCRYPTION_MODIFIER=${SHUFFLE_ENCRYPTION_MODIFIER}
      - BACKEND_HOSTNAME=shuffle-backend
      - BACKEND_PORT=5001
      - SHUFFLE_ORBORUS_EXECUTION_TIMEOUT=600
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - shuffle-files:/shuffle-files
      # Docker socket needed to manage apps (required by Shuffle)
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - wazuh-opencti
    depends_on:
      shuffle-opensearch:
        condition: service_healthy

  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:${SHUFFLE_VERSION}
    hostname: shuffle-frontend
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wazuh-opencti
    depends_on:
      shuffle-backend:
        condition: service_healthy

  shuffle-orborus:
    image: ghcr.io/shuffle/shuffle-orborus:${SHUFFLE_VERSION}
    hostname: shuffle-orborus
    restart: always
    logging: *default-logging
    env_file: *proxy-env
    # No cap_drop/no-new-privileges: orborus needs Docker socket to spawn workers
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    environment:
      - SHUFFLE_APP_SDK_VERSION=${SHUFFLE_VERSION}
      - SHUFFLE_WORKER_VERSION=${SHUFFLE_VERSION}
      - BASE_URL=http://shuffle-backend:5001
      - SHUFFLE_BASE_URL=http://shuffle-backend:5001
      - DOCKER_API_VERSION=1.40
      - SHUFFLE_ORBORUS_EXECUTION_TIMEOUT=600
      - SHUFFLE_ORBORUS_EXECUTION_CONCURRENCY=5
      - CLEANUP=true
      - RUNNING_MODE=docker
      - SHUFFLE_WORKER_IMAGE=ghcr.io/shuffle/shuffle-worker:${SHUFFLE_VERSION}
      - SHUFFLE_SWARM_NETWORK_NAME=wazuh-opencti
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f orborus || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Docker socket required for orborus to spawn workflow worker containers
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - wazuh-opencti
    depends_on:
      shuffle-backend:
        condition: service_healthy

  # ==========================================
  # NETWORK IDS (optional)
  # Activate with: docker compose --profile suricata up -d
  # Monitors host network traffic, feeds alerts to Wazuh
  # ==========================================

  suricata:
    image: jasonish/suricata:${SURICATA_VERSION:-7.0.10}
    hostname: suricata
    restart: always
    profiles: ["suricata"]
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    network_mode: host
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, NET_RAW, SYS_NICE]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.00"
    environment:
      - SURICATA_OPTIONS=-i eth0 --set outputs.1.eve-log.filename=/var/log/suricata/eve.json
    volumes:
      - suricata-logs:/var/log/suricata
      - suricata-rules:/var/lib/suricata
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f suricata || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Sidecar: ships Suricata eve.json logs to Wazuh manager via syslog
  suricata-forwarder:
    image: alpine:3.21
    hostname: suricata-forwarder
    restart: always
    profiles: ["suricata"]
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache inotify-tools > /dev/null 2>&1
        echo "Waiting for eve.json..."
        while [ ! -f /var/log/suricata/eve.json ]; do sleep 5; done
        echo "Forwarding Suricata logs to Wazuh..."
        tail -F /var/log/suricata/eve.json | while read line; do
          echo "$$line" | nc -w1 -u wazuh.manager 514
        done
    volumes:
      - suricata-logs:/var/log/suricata:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'tail -F' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - wazuh-opencti
    depends_on:
      suricata:
        condition: service_healthy

  # ==========================================
  # MONITORING (optional)
  # Activate with: docker compose --profile monitoring up -d
  # ==========================================

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    hostname: prometheus
    restart: always
    profiles: ["monitoring"]
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    deploy: { resources: { limits: { memory: 1G, cpus: "0.50" } } }
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=30d
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - wazuh-opencti
    depends_on:
      cadvisor:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}
    hostname: cadvisor
    restart: always
    profiles: ["monitoring"]
    logging: *default-logging
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - wazuh-opencti

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    hostname: grafana
    restart: always
    profiles: ["monitoring"]
    logging: *default-logging
    deploy: { resources: { limits: { memory: 512M, cpus: "0.50" } } }
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://localhost:4443
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - wazuh-opencti
    depends_on:
      prometheus:
        condition: service_healthy

  # ==========================================
  # NGINX HTTPS REVERSE PROXY
  # ==========================================

  nginx:
    image: nginx:1.28-alpine
    hostname: nginx
    restart: always
    logging: *default-logging
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE, DAC_OVERRIDE, CHOWN, SETUID, SETGID]
    read_only: true
    tmpfs:
      - /tmp:size=16M
      - /var/cache/nginx:size=64M
      - /run:size=1M
    deploy: { resources: { limits: { memory: 256M, cpus: "0.50" } } }
    ports:
      - "${OPENCTI_PORT:-8443}:8443"
      - "${SHUFFLE_PORT:-3443}:3443"
      - "${GRAFANA_PORT:-4443}:4443"
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8443 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./config/nginx/opencti.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/shuffle.conf:/etc/nginx/conf.d/shuffle.conf:ro
      - ./config/nginx/grafana.conf:/etc/nginx/conf.d/grafana.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - wazuh-opencti
    depends_on:
      opencti:
        condition: service_healthy
      shuffle-frontend:
        condition: service_healthy

networks:
  wazuh-opencti:
    driver: bridge
    name: wazuh-opencti

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  esdata:
  s3data:
  redisdata:
  amqpdata:
  shuffle-opensearch-data:
  shuffle-files:
  prometheus-data:
  grafana-data:
  suricata-logs:
  suricata-rules:
